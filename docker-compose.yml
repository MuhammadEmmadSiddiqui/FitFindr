version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitfindr-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/fitfindr.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: python -m uvicorn --app-dir backend src.api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    networks:
      - fitfindr-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: fitfindr-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fitfindr-network

  # PostgreSQL (optional — uncomment to use)
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: fitfindr-postgres
  #   environment:
  #     POSTGRES_USER: fitfindr
  #     POSTGRES_PASSWORD: fitfindr_password
  #     POSTGRES_DB: fitfindr
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   networks:
  #     - fitfindr-network

networks:
  fitfindr-network:
    driver: bridge

volumes:
  postgres_data:
